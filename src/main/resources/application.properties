spring.application.name=wineaudit
server.port=9090  
  # H2
spring.datasource.url=jdbc:h2:mem:wineaudit;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
  
  # Flyway
spring.flyway.enabled=true
  
  # Kafka
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=wineaudit
spring.kafka.consumer.auto-offset-reset=earliest
  
  # We'll consume DomainEvent JSON
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
  
  # Important: allow deserialization of your package
#spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.wineaudit.events,com.fasterxml.jackson.databind.node,java.util,java.time
  
  # Topic
wineaudit.kafka.topic=winecellar.events
  
  # Actuator
management.endpoints.web.exposure.include=health,info
